  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

    z-index: 200;\n      background: rgba(250,250,248,0.92);\n      backdrop-filter: blur(12px);\n      border-bottom: 1px solid var(--rule);\n    }\n    .nav-inner {\n      max-width: 1120px;\n      margin: 0 auto;\n      padding: 0 2rem;\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      height: 56px;\n    }\n    .nav-logo {\n      font-family: 'Space Grotesk', sans-serif;\n      font-weight: 600;\n      font-size: 0.9rem;\n      letter-spacing: 0.08em;\n      text-transform: uppercase;\n      color: var(--ink);\n      text-decoration: none;\n    }\n    .nav-logo span {\n      background: linear-gradient(90deg, var(--accent-a), var(--accent-b));\n      -webkit-background-clip: text;\n      -webkit-text-fill-color: transparent;\n      background-clip: text;\n    }\n    nav ul {\n      list-style: none;\n      display: flex;\n      gap: 2rem;\n    }\n    nav a {\n      font-family: 'DM Sans', sans-serif;\n      font-size: 0.85rem;\n      font-weight: 400;\n      color: var(--ink-2);\n      text-decoration: none;\n      letter-spacing: 0.02em;\n      transition: color 0.2s;\n    }\n    nav a:hover { color: var(--ink); }\n\n    /* ── HERO ── */\n    .hero {\n      min-height: 92vh;\n      display: grid;\n      place-items: center;\n      position: relative;\n      overflow: hidden;\n      padding: 6rem 2rem 7rem;\n    }\n\n    /* MOTIF CANVAS */\n    #motif-canvas {\n      position: absolute;\n      inset: 0;\n      width: 100%;\n      height: 100%;\n      pointer-events: none;\n    }\n\n    .hero-content {\n      position: relative;\n      z-index: 2;\n      text-align: center;\n      max-width: 860px;\n    }\n\n    .hero-eyebrow {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: 0.75rem;\n      font-weight: 500;\n      letter-spacing: 0.2em;\n      text-transform: uppercase;\n      color: var(--ink-3);\n      margin-bottom: 1.5rem;\n    }\n\n    .hero h1 {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: clamp(4rem, 10vw, 8.5rem);\n      font-weight: 700;\n      line-height: 0.95;\n      letter-spacing: -0.03em;\n      color: var(--ink);\n      margin-bottom: 1rem;\n    }\n\n    .hero-theme {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: clamp(1.5rem, 4vw, 3rem);\n      font-weight: 300;\n      letter-spacing: 0.08em;\n      text-transform: uppercase;\n      margin-bottom: 2.5rem;\n      background: linear-gradient(100deg, var(--accent-a), var(--accent-b));\n      -webkit-background-clip: text;\n      -webkit-text-fill-color: transparent;\n      background-clip: text;\n    }\n\n    .hero-desc {\n      font-size: 1.05rem;\n      color: var(--ink-2);\n      max-width: 540px;\n      margin: 0 auto 3rem;\n      line-height: 1.7;\n      font-weight: 300;\n    }\n\n    .hero-meta {\n      display: flex;\n      justify-content: center;\n      gap: 3rem;\n      flex-wrap: wrap;\n    }\n    .meta-item {\n      text-align: left;\n    }\n    .meta-label {\n      font-size: 0.7rem;\n      font-weight: 500;\n      letter-spacing: 0.15em;\n      text-transform: uppercase;\n      color: var(--ink-3);\n      display: block;\n      margin-bottom: 0.2rem;\n    }\n    .meta-value {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: 0.95rem;\n      font-weight: 500;\n      color: var(--ink);\n    }\n\n    /* ── SCROLL INDICATOR ── */\n    .scroll-line {\n      position: absolute;\n      bottom: 1.25rem;\n      left: 50%;\n      transform: translateX(-50%);\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      gap: 0.5rem;\n      opacity: 0.4;\n    }\n    .scroll-line span {\n      font-size: 0.65rem;\n      letter-spacing: 0.15em;\n      text-transform: uppercase;\n      font-family: 'Space Grotesk', sans-serif;\n    }\n    .scroll-line::after {\n      content: '';\n      width: 1px;\n      height: 48px;\n      background: linear-gradient(to bottom, var(--ink), transparent);\n      animation: scrollPulse 2s ease-in-out infinite;\n    }\n    @keyframes scrollPulse {\n      0%, 100% { opacity: 0.4; transform: scaleY(1); }\n      50% { opacity: 0.8; transform: scaleY(0.8); }\n    }\n\n    /* ── SECTIONS ── */\n    .section-wrap {\n      max-width: 1120px;\n      margin: 0 auto;\n      padding: 0 2rem;\n    }\n\n    section {\n      padding: 6rem 0;\n      border-top: 1px solid var(--rule);\n    }\n    section.alt { background: var(--bg-alt); }\n    .alt .section-wrap { /* no change */ }\n\n    .section-header {\n      display: grid;\n      grid-template-columns: auto 1fr;\n      align-items: baseline;\n      gap: 2rem;\n      margin-bottom: 3.5rem;\n    }\n    .section-index {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: 0.7rem;\n      font-weight: 500;\n      letter-spacing: 0.2em;\n      text-transform: uppercase;\n      color: var(--ink-3);\n      padding-top: 0.2rem;\n    }\n    .section-header h2 {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: clamp(1.8rem, 4vw, 3rem);\n      font-weight: 700;\n      letter-spacing: -0.02em;\n      line-height: 1.15;\n      color: var(--ink);\n    }\n\n    /* ── ABOUT ── */\n    .about-grid {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      gap: 4rem;\n      align-items: start;\n    }\n    .about-body p {\n      font-size: 1.05rem;\n      line-height: 1.75;\n      color: var(--ink-2);\n      font-weight: 300;\n      margin-bottom: 1rem;\n    }\n    .about-body p:last-child { margin-bottom: 0; }\n    .about-theme-block {\n      border-top: 3px solid transparent;\n      border-image: linear-gradient(90deg, var(--accent-a), var(--accent-b)) 1;\n      padding-top: 1.5rem;\n    }\n    .about-theme-label {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: 0.7rem;\n      font-weight: 600;\n      letter-spacing: 0.2em;\n      text-transform: uppercase;\n      color: var(--ink-3);\n      margin-bottom: 1rem;\n    }\n    .about-theme-text {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: 1.4rem;\n      font-weight: 300;\n      line-height: 1.4;\n      letter-spacing: -0.01em;\n      color: var(--ink);\n    }\n\n    /* ── SUBMISSIONS ── */\n    .sub-types {\n      display: grid;\n      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));\n      gap: 1px;\n      background: var(--rule);\n      margin-top: 2.5rem;\n    }\n    .sub-type {\n      background: var(--bg);\n      padding: 1.75rem 1.5rem;\n    }\n    .alt .sub-type { background: var(--bg-alt); }\n    .sub-type-num {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: 0.65rem;\n      font-weight: 600;\n      letter-spacing: 0.2em;\n      color: var(--ink-3);\n      margin-bottom: 0.75rem;\n    }\n    .sub-type h3 {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: 0.95rem;\n      font-weight: 600;\n      color: var(--ink);\n      margin-bottom: 0.5rem;\n    }\n    .sub-type p {\n      font-size: 0.85rem;\n      color: var(--ink-2);\n      line-height: 1.5;\n      font-weight: 300;\n    }\n\n    .sub-deadline-row {\n      display: grid;\n      grid-template-columns: repeat(4, 1fr);\n      gap: 1px;\n      background: var(--rule);\n      margin-top: 3rem;\n    }\n    .deadline-cell {\n      background: var(--bg);\n      padding: 1.5rem 2rem;\n    }\n    .alt .deadline-cell { background: var(--bg-alt); }\n    .deadline-label {\n      font-size: 0.7rem;\n      font-weight: 500;\n      letter-spacing: 0.15em;\n      text-transform: uppercase;\n      color: var(--ink-3);\n      margin-bottom: 0.4rem;\n    }\n    .deadline-value {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: 1.2rem;\n      font-weight: 600;\n      color: var(--ink);\n    }\n\n    .sub-note {\n      margin-top: 2rem;\n      font-size: 0.9rem;\n      color: var(--ink-2);\n    }\n    .sub-note a {\n      color: var(--accent-a);\n      text-decoration: none;\n      font-weight: 500;\n      border-bottom: 1px solid currentColor;\n    }\n\n    /* ── ORGANIZERS ── */\n    .org-grid {\n      display: grid;\n      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n      gap: 1px;\n      background: var(--rule);\n    }\n    .org-card {\n      background: var(--bg);\n      padding: 2rem;\n    }\n    .org-num {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: 0.65rem;\n      font-weight: 600;\n      letter-spacing: 0.2em;\n      color: var(--ink-3);\n      margin-bottom: 1.25rem;\n    }\n    .org-name {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: 1.1rem;\n      font-weight: 600;\n      color: var(--ink);\n      margin-bottom: 0.2rem;\n    }\n    .org-name a {\n      color: inherit;\n      text-decoration: none;\n      border-bottom: 1px solid var(--rule);\n      transition: border-color 0.2s;\n    }\n    .org-name a:hover { border-color: var(--accent-a); }\n    .org-affil {\n      font-size: 0.85rem;\n      color: var(--ink-2);\n      margin-bottom: 0.85rem;\n    }\n    .org-bio {\n      font-size: 0.85rem;\n      color: var(--ink-2);\n      line-height: 1.6;\n      font-weight: 300;\n    }\n\n    /* ── CONTACT ── */\n    .contact-grid {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      gap: 4rem;\n      align-items: start;\n    }\n    .contact-label {\n      font-size: 0.7rem;\n      font-weight: 500;\n      letter-spacing: 0.15em;\n      text-transform: uppercase;\n      color: var(--ink-3);\n      margin-bottom: 0.5rem;\n    }\n    .contact-email {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: 1.4rem;\n      font-weight: 500;\n      color: var(--ink);\n      text-decoration: none;\n      border-bottom: 2px solid transparent;\n      background-image: linear-gradient(90deg, var(--accent-a), var(--accent-b));\n      background-size: 0% 2px;\n      background-repeat: no-repeat;\n      background-position: 0 100%;\n      padding-bottom: 2px;\n      transition: background-size 0.35s ease;\n    }\n    .contact-email:hover { background-size: 100% 2px; }\n    .contact-context {\n      font-size: 0.9rem;\n      color: var(--ink-2);\n      line-height: 1.6;\n      margin-top: 1.5rem;\n    }\n    .contact-context a { color: var(--ink); font-weight: 500; }\n\n    /* ── FOOTER ── */\n    footer {\n      border-top: 1px solid var(--rule);\n      padding: 2rem;\n    }\n    .footer-inner {\n      max-width: 1120px;\n      margin: 0 auto;\n      display: flex;\n      justify-content: space-between;\n      align-items: center;\n      flex-wrap: wrap;\n      gap: 1rem;\n    }\n    .footer-copy {\n      font-size: 0.8rem;\n      color: var(--ink-3);\n    }\n    .footer-links {\n      display: flex;\n      gap: 1.5rem;\n    }\n    .footer-links a {\n      font-size: 0.8rem;\n      color: var(--ink-3);\n      text-decoration: none;\n      transition: color 0.2s;\n    }\n    .footer-links a:hover { color: var(--ink); }\n\n    /* ── RESPONSIVE ── */\n    @media (max-width: 720px) {\n      .about-grid, .contact-grid { grid-template-columns: 1fr; gap: 2rem; }\n      .sub-deadline-row { grid-template-columns: 1fr; }\n      nav ul { display: none; }\n      .section-header { grid-template-columns: 1fr; gap: 0.5rem; }\n    }\n\n    /* ── TWEAKS PANEL ── */\n    #tweaks-panel {\n      display: none;\n      position: fixed;\n      bottom: 1.5rem;\n      right: 1.5rem;\n      z-index: 1000;\n      background: var(--bg);\n      border: 1px solid var(--rule);\n      border-radius: 8px;\n      box-shadow: 0 8px 32px rgba(0,0,0,0.12);\n      padding: 1.25rem 1.5rem;\n      width: 230px;\n    }\n    #tweaks-panel h4 {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: 0.75rem;\n      font-weight: 600;\n      letter-spacing: 0.15em;\n      text-transform: uppercase;\n      color: var(--ink-3);\n      margin-bottom: 1rem;\n    }\n    .tweak-row { margin-bottom: 1rem; }\n    .tweak-label {\n      font-size: 0.75rem;\n      font-weight: 500;\n      color: var(--ink-2);\n      margin-bottom: 0.4rem;\n    }\n    .tweak-btns {\n      display: flex;\n      gap: 0.4rem;\n      flex-wrap: wrap;\n    }\n    .tweak-btn {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: 0.7rem;\n      font-weight: 500;\n      padding: 0.3rem 0.65rem;\n      border-radius: 3px;\n      border: 1px solid var(--rule);\n      background: var(--bg);\n      color: var(--ink-2);\n      cursor: pointer;\n      transition: all 0.15s;\n    }\n    .tweak-btn:hover, .tweak-btn.active {\n      background: var(--ink);\n      color: var(--bg);\n      border-color: var(--ink);\n    }\n  <\u002Fstyle>\n\n\n<\u002Fhead><body>\n\n<!-- ── NAV ── -->\n<nav>\n  <div class=\"nav-inner\">\n    <a href=\"#home\" class=\"nav-logo\">VISAP <span>2026<\u002Fspan><\u002Fa>\n    <ul>\n      <li><a href=\"#about\">About<\u002Fa><\u002Fli>\n      <li><a href=\"#submissions\">Submit<\u002Fa><\u002Fli>\n      <li><a href=\"#organizers\">Organizers<\u002Fa><\u002Fli>\n      <li><a href=\"#contact\">Contact<\u002Fa><\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ── HERO ── -->\n<section id=\"home\" class=\"hero\">\n  <svg id=\"motif-canvas\" viewBox=\"0 0 1200 800\" preserveAspectRatio=\"xMidYMid slice\" xmlns=\"http://www.w3.org/2000/svg\">\n    <defs>\n      <linearGradient id=\"mg\" x1=\"0%\" y1=\"0%\" x2=\"100%\" y2=\"0%\">\n        <stop offset=\"0%\" stop-color=\"#E84545\" stop-opacity=\"0.35\"><\u002Fstop>\n        <stop offset=\"100%\" stop-color=\"#8B3FC8\" stop-opacity=\"0.35\"><\u002Fstop>\n      <\u002FlinearGradient>\n    <\u002Fdefs>\n    <g id=\"motif-rings\" class=\"motif-group\">\n      <!-- Concentric rings — amplification ripples -->\n      <circle cx=\"600\" cy=\"400\" r=\"80\" fill=\"none\" stroke=\"url(#mg)\" stroke-width=\"1.5\" opacity=\"0.9\"><animate attributeName=\"r\" values=\"80;280\" dur=\"4s\" repeatCount=\"indefinite\" begin=\"0s\"><\u002Fanimate><animate attributeName=\"opacity\" values=\"0.9;0\" dur=\"4s\" repeatCount=\"indefinite\" begin=\"0s\"><\u002Fanimate><\u002Fcircle>\n      <circle cx=\"600\" cy=\"400\" r=\"80\" fill=\"none\" stroke=\"url(#mg)\" stroke-width=\"1.5\" opacity=\"0.9\"><animate attributeName=\"r\" values=\"80;280\" dur=\"4s\" repeatCount=\"indefinite\" begin=\"1s\"><\u002Fanimate><animate attributeName=\"opacity\" values=\"0.9;0\" dur=\"4s\" repeatCount=\"indefinite\" begin=\"1s\"><\u002Fanimate><\u002Fcircle>\n      <circle cx=\"600\" cy=\"400\" r=\"80\" fill=\"none\" stroke=\"url(#mg)\" stroke-width=\"1.5\" opacity=\"0.9\"><animate attributeName=\"r\" values=\"80;280\" dur=\"4s\" repeatCount=\"indefinite\" begin=\"2s\"><\u002Fanimate><animate attributeName=\"opacity\" values=\"0.9;0\" dur=\"4s\" repeatCount=\"indefinite\" begin=\"2s\"><\u002Fanimate><\u002Fcircle>\n      <circle cx=\"600\" cy=\"400\" r=\"80\" fill=\"none\" stroke=\"url(#mg)\" stroke-width=\"1.5\" opacity=\"0.9\"><animate attributeName=\"r\" values=\"80;280\" dur=\"4s\" repeatCount=\"indefinite\" begin=\"3s\"><\u002Fanimate><animate attributeName=\"opacity\" values=\"0.9;0\" dur=\"4s\" repeatCount=\"indefinite\" begin=\"3s\"><\u002Fanimate><\u002Fcircle>\n      <!-- Static rings at distance -->\n      <circle cx=\"600\" cy=\"400\" r=\"340\" fill=\"none\" stroke=\"url(#mg)\" stroke-width=\"0.5\" opacity=\"0.15\"><\u002Fcircle>\n      <circle cx=\"600\" cy=\"400\" r=\"420\" fill=\"none\" stroke=\"url(#mg)\" stroke-width=\"0.5\" opacity=\"0.1\"><\u002Fcircle>\n      <circle cx=\"600\" cy=\"400\" r=\"500\" fill=\"none\" stroke=\"url(#mg)\" stroke-width=\"0.5\" opacity=\"0.07\"><\u002Fcircle>\n    <\u002Fg>\n    <g id=\"motif-wave\" class=\"motif-group\" style=\"display:none\">\n      <!-- Waveform lines -->\n      <polyline id=\"wave-line\" fill=\"none\" stroke=\"url(#mg)\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpolyline>\n      <polyline id=\"wave-line2\" fill=\"none\" stroke=\"url(#mg)\" stroke-width=\"1\" stroke-linecap=\"round\" opacity=\"0.4\"><\u002Fpolyline>\n    <\u002Fg>\n    <g id=\"motif-pulse\" class=\"motif-group\" style=\"display:none\">\n      <!-- Radial pulse lines -->\n    <\u002Fg>\n  <\u002Fsvg>\n\n  <div class=\"hero-content\">\n    <p class=\"hero-eyebrow\">IEEE VIS Arts Program &nbsp;·&nbsp; Boston, Massachusetts<\u002Fp>\n    <h1>VISAP<br>2026<\u002Fh1>\n    <p class=\"hero-theme\">Amplification<\u002Fp>\n    <p class=\"hero-desc\">Visualizations as tools to amplify messages, voices, and ideas — explored at the intersection of data, art, and design.<\u002Fp>\n    <div class=\"hero-meta\">\n      <div class=\"meta-item\">\n        <span class=\"meta-label\">Dates<\u002Fspan>\n        <span class=\"meta-value\">November 9–13, 2026<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"meta-item\">\n        <span class=\"meta-label\">Location<\u002Fspan>\n        <span class=\"meta-value\">Boston, Massachusetts<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"meta-item\">\n        <span class=\"meta-label\">Submissions open<\u002Fspan>\n        <span class=\"meta-value\">May 2026<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"scroll-line\"><span>Scroll<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── ABOUT ── -->\n<section id=\"about\" class=\"alt\">\n  <div class=\"section-wrap\">\n    <div class=\"section-header\">\n      <span class=\"section-index\">01<\u002Fspan>\n      <h2>About VISAP<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"about-grid\">\n      <div class=\"about-body\">\n        <p>The IEEE VIS Arts Program (VISAP) is a dedicated venue for visualization researchers, designers, and artists exploring innovative approaches at the intersection of visualization and the arts.<\u002Fp>\n        <p>VISAP brings together practitioners who push the boundaries of what data visualization can be — from scientific rigor to artistic expression, from community storytelling to critical speculation.<\u002Fp>\n        <p>Held annually as part of IEEE VIS, the premier forum for visualization and visual analytics, VISAP provides a unique platform where technical and artistic communities meet.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"about-theme-block\">\n        <p class=\"about-theme-label\">This year's theme<\u002Fp>\n        <p class=\"about-theme-text\">Amplification — visualizations as instruments that make the quiet legible and the overlooked visible. What does it mean to turn up the signal on data, stories, and communities that the world tends not to hear?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── SUBMISSIONS ── -->\n<section id=\"submissions\">\n  <div class=\"section-wrap\">\n    <div class=\"section-header\">\n      <span class=\"section-index\">02<\u002Fspan>\n      <h2>Call for<br>Submissions<\u002Fh2>\n    <\u002Fdiv>\n\n    <p style=\"color:var(--ink-2); max-width:600px; font-weight:300; line-height:1.75;\">We welcome contributions across three tracks, all engaging with the theme of Amplification. All submissions are made via the IEEE VGTC Electronic Conference System (PCS). VISAP uses a single-blind review process.<\u002Fp>\n\n    <div class=\"sub-types\">\n      <div class=\"sub-type\">\n        <h3>Paper<\u002Fh3>\n        <p>Research, reflections, and critical writing on creative visualization practice. Technical descriptions, philosophical meditations, design case studies, and interpretations of visualization approaches. Up to 10 pages, IEEE Conference format.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"sub-type\">\n        <h3>Pictorial<\u002Fh3>\n        <p>Visual descriptions and reflections on the design process of visualization works. Pictorials and annotated portfolios that communicate practice in rich, heavily visual ways. Up to 16 pages, VISAP Pictorial format.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"sub-type\">\n        <h3>Artwork<\u002Fh3>\n        <p>Data-driven artworks in any medium — interactive projections, sculptures, digital prints, video, VR/AR, sonification, and more. Free-form 2-page proposal with supporting images or video.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"sub-deadline-row\">\n      <div class=\"deadline-cell\">\n        <p class=\"deadline-label\">Call Opens<\u002Fp>\n        <p class=\"deadline-value\">May 2026<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"deadline-cell\">\n        <p class=\"deadline-label\">Submission Deadline<\u002Fp>\n        <p class=\"deadline-value\">TBD — June 2026<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"deadline-cell\">\n        <p class=\"deadline-label\">Notifications<\u002Fp>\n        <p class=\"deadline-value\">TBD — July 2026<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"deadline-cell\">\n        <p class=\"deadline-label\">Camera Ready<\u002Fp>\n        <p class=\"deadline-value\">TBD — August 2026<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"sub-note\">All deadlines at 11:59 pm AoE. Detailed submission guidelines will be published when the call opens.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── ORGANIZERS ── -->\n<section id=\"organizers\" class=\"alt\">\n  <div class=\"section-wrap\">\n    <div class=\"section-header\">\n      <span class=\"section-index\">03<\u002Fspan>\n      <h2>Organizers<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"org-grid\">\n      <div class=\"org-card\">\n        <div class=\"org-name\"><a href=\"https://dariorodighiero.com\" target=\"_blank\">Dario Rodighiero<\u002Fa><\u002Fdiv>\n        <div class=\"org-affil\">University of Groningen<\u002Fdiv>\n        <div class=\"org-bio\">Assistant Professor of STS at Campus Fryslân, Faculty Associate at the Berkman Klein Center and Principal at metaLAB (at) Harvard / Berlin / Basel. His research investigates how complex information can be revealed through the combination of computational techniques and design, with a focus on the mapping of science and digital cultural archives. He is the author of <em>Mapping Affinities: Democratizing Data Visualization<\u002Fem> (Métis Presses, 2021), holds a PhD from EPFL, and has held research positions at MIT, Sciences Po, and the European Commission.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"org-card\">\n        <div class=\"org-name\"><a href=\"https://civicdatadesignlab.mit.edu/Sarah-Williams\" target=\"_blank\">Sarah Williams<\u002Fa><\u002Fdiv>\n        <div class=\"org-affil\">MIT<\u002Fdiv>\n        <div class=\"org-bio\">Director of the Civic Data Design Lab and Associate Professor of Technology and Urban Planning at MIT. Her research uses data collection, mapping, and visualization to address issues of equity and urban development in cities around the world. She has led projects across sub-Saharan Africa, China, and the Americas, developing open-source tools that put data analysis in the hands of communities and policymakers. Her work bridges design and policy, and has been recognized for its impact on urban planning practice and civic technology.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"org-card\">\n        <div class=\"org-name\"><a href=\"https://www.zhangweidi.com\" target=\"_blank\">Weidi Zhang<\u002Fa><\u002Fdiv>\n        <div class=\"org-affil\">Arizona State University<\u002Fdiv>\n        <div class=\"org-bio\">Tenure-track Assistant Professor of Immersive Experience Design at the MIX Center, Arizona State University. Her research explores a speculative assemblage of artificial memories and language at the intersection of immersive media design, experimental data visualization, and interactive AI art. Her work has earned distinctions including Best in Show at ACM SIGGRAPH and Honorary Mention at Prix Ars Electronica. She holds a PhD from UC Santa Barbara and has exhibited at CCCB, V2_ Lab, Artechouse NYC, and festivals across Europe, Asia, and the Americas.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── CONTACT ── -->\n<section id=\"contact\">\n  <div class=\"section-wrap\">\n    <div class=\"section-header\">\n      <span class=\"section-index\">04<\u002Fspan>\n      <h2>Get in Touch<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"contact-grid\">\n      <div>\n        <p class=\"contact-label\">Email<\u002Fp>\n        <a href=\"mailto:art@ieeevis.org\" class=\"contact-email\">art@ieeevis.org<\u002Fa>\n        <p class=\"contact-context\">For questions about submissions, sponsorship, or the program. We aim to respond within 5 business days.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <p class=\"contact-label\">Part of<\u002Fp>\n        <p style=\"font-family:'Space Grotesk',sans-serif; font-size:1.1rem; font-weight:500; color:var(--ink); margin-bottom:0.75rem;\">IEEE VIS 2026<\u002Fp>\n        <p style=\"font-size:0.9rem; color:var(--ink-2); line-height:1.6;\">The premier annual forum for advances in visualization and visual analytics. <a href=\"https://ieeevis.org\" target=\"_blank\">ieeevis.org →<\u002Fa><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── FOOTER ── -->\n<footer>\n  <div class=\"footer-inner\">\n    <p class=\"footer-copy\">© 2026 IEEE VIS Arts Program<\u002Fp>\n    <div class=\"footer-links\">\n      <a href=\"https://ieeevis.org\" target=\"_blank\">IEEE VIS<\u002Fa>\n      <a href=\"https://github.com/IEEE-VIS-Arts-Program\" target=\"_blank\">GitHub<\u002Fa>\n      <a href=\"mailto:art@ieeevis.org\">Email<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- ── TWEAKS ── -->\n<div id=\"tweaks-panel\">\n  <h4>Tweaks<\u002Fh4>\n\n  <div class=\"tweak-row\">\n    <div class=\"tweak-label\">Amplification motif<\u002Fdiv>\n    <div class=\"tweak-btns\">\n      <button class=\"tweak-btn active\" onclick=\"setMotif('rings',this)\">Rings<\u002Fbutton>\n      <button class=\"tweak-btn\" onclick=\"setMotif('wave',this)\">Wave<\u002Fbutton>\n      <button class=\"tweak-btn\" onclick=\"setMotif('pulse',this)\">Pulse<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tweak-row\">\n    <div class=\"tweak-label\">Color accent<\u002Fdiv>\n    <div class=\"tweak-btns\">\n      <button class=\"tweak-btn active\" onclick=\"setAccent('coral',this)\">Coral–Violet<\u002Fbutton>\n      <button class=\"tweak-btn\" onclick=\"setAccent('teal',this)\">Teal–Cobalt<\u002Fbutton>\n      <button class=\"tweak-btn\" onclick=\"setAccent('mono',this)\">Mono<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // ── WAVE MOTIF GENERATOR ──\n  function generateWave() {\n    const t = Date.now() / 1000;\n    const pts1 = [], pts2 = [];\n    for (let i = 0; i <= 120; i++) {\n      const x = i * 10;\n      const base = 400;\n      const amp = 80 * Math.exp(-Math.pow((x - 600) / 280, 2));\n      const y1 = base + amp * Math.sin(i * 0.35 - t * 2.5);\n      const y2 = base + (amp * 0.5) * Math.sin(i * 0.35 - t * 2.5 + 1.2);\n      pts1.push(`${x},${y1}`);\n      pts2.push(`${x},${y2}`);\n    }\n    document.getElementById('wave-line').setAttribute('points', pts1.join(' '));\n    document.getElementById('wave-line2').setAttribute('points', pts2.join(' '));\n  }\n\n  // ── PULSE MOTIF GENERATOR ──\n  function buildPulse() {\n    const g = document.getElementById('motif-pulse');\n    g.innerHTML = '';\n    const N = 24;\n    for (let i = 0; i < N; i++) {\n      const angle = (i / N) * Math.PI * 2;\n      const len = 80 + Math.random() * 180;\n      const cx = 600, cy = 400, r0 = 70;\n      const x1 = cx + Math.cos(angle) * r0;\n      const y1 = cy + Math.sin(angle) * r0;\n      const x2 = cx + Math.cos(angle) * (r0 + len);\n      const y2 = cy + Math.sin(angle) * (r0 + len);\n      const line = document.createElementNS('http://www.w3.org/2000/svg','line');\n      line.setAttribute('x1', x1); line.setAttribute('y1', y1);\n      line.setAttribute('x2', x2); line.setAttribute('y2', y2);\n      line.setAttribute('stroke', 'url(#mg)');\n      line.setAttribute('stroke-width', '1');\n      line.setAttribute('stroke-linecap', 'round');\n      line.setAttribute('opacity', (0.3 + Math.random() * 0.5).toFixed(2));\n      const anim = document.createElementNS('http://www.w3.org/2000/svg','animate');\n      anim.setAttribute('attributeName','opacity');\n      anim.setAttribute('values',`${line.getAttribute('opacity')};0.05;${line.getAttribute('opacity')}`);\n      anim.setAttribute('dur', (2.5 + Math.random() * 2) + 's');\n      anim.setAttribute('repeatCount','indefinite');\n      anim.setAttribute('begin', (Math.random() * 3) + 's');\n      line.appendChild(anim);\n      g.appendChild(line);\n    }\n  }\n  buildPulse();\n\n  let waveRaf;\n  function startWaveLoop() {\n    generateWave();\n    waveRaf = requestAnimationFrame(startWaveLoop);\n  }\n\n  let currentMotif = 'rings';\n  function setMotif(name, btn) {\n    currentMotif = name;\n    document.querySelectorAll('#motif-rings, #motif-wave, #motif-pulse').forEach(el => el.style.display = 'none');\n    document.getElementById('motif-' + name).style.display = '';\n    if (name === 'wave') startWaveLoop();\n    else cancelAnimationFrame(waveRaf);\n    document.querySelectorAll('.tweak-btn').forEach(b => {\n      if (b.onclick && b.onclick.toString().includes('setMotif')) b.classList.remove('active');\n    });\n    btn.classList.add('active');\n    persist();\n  }\n\n  function setAccent(name, btn) {\n    const palettes = {\n      coral: { a: '#E84545', b: '#8B3FC8' },\n      teal:  { a: '#0EA89E', b: '#2563EB' },\n      mono:  { a: '#3A3A3A', b: '#888888' },\n    };\n    const p = palettes[name];\n    document.documentElement.style.setProperty('--accent-a', p.a);\n    document.documentElement.style.setProperty('--accent-b', p.b);\n    document.querySelectorAll('.tweak-btn').forEach(b => {\n      if (b.onclick && b.onclick.toString().includes('setAccent')) b.classList.remove('active');\n    });\n    btn.classList.add('active');\n    persist();\n  }\n\n  function persist() {\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { motif: currentMotif } }, '*');\n  }\n\n  // ── TWEAKS TOGGLE ──\n  window.addEventListener('message', e => {\n    if (e.data.type === '__activate_edit_mode') document.getElementById('tweaks-panel').style.display = 'block';\n    if (e.data.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';\n  });\n  window.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\n  // ── ENTRANCE ANIMATION ──\n  const style = document.createElement('style');\n  style.textContent = `\n    .hero-eyebrow, .hero h1, .hero-theme, .hero-desc, .hero-meta {\n      opacity: 0;\n      transform: translateY(20px);\n      animation: fadeUp 0.8s ease forwards;\n    }\n    .hero-eyebrow { animation-delay: 0.1s; }\n    .hero h1      { animation-delay: 0.25s; }\n    .hero-theme   { animation-delay: 0.45s; }\n    .hero-desc    { animation-delay: 0.6s; }\n    .hero-meta    { animation-delay: 0.75s; }\n    @keyframes fadeUp {\n      to { opacity: 1; transform: translateY(0); }\n    }\n  `;\n  document.head.appendChild(style);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
